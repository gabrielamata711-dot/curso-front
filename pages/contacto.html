<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,400;0,600;0,700;0,800;1,100;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Contacto</title>
  </head>
  <body>
    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html"
          ><img src="../img/flower.jpeg" alt="imagen flower" /> Blossom</a
        >
      </div>
      <nav class="header-nav">
        <ul>
          <li>
            <a href="../index.html">Inicio</a>
          </li>
          <li>
            <a href="./contacto.html">Contacto</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="titulo-contacto text-secondary">Contactanos</h1>

      <form
        class="form-contacto"
        action="https://formspree.io/f/mykoeojr"
        method="POST"
      >
        <div class="grupo-input">
          <label for="name"> Nombre </label>
          <input id="name" type="nombre" name="nombre" />
        </div>
        <div class="grupo-input">
          <label for="email"> Email: </label>
          <input id="email" type="email" name="email" />
        </div>
        <div class="grupo-input">
          <label for="message"> message:</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
      </form>
    </main>
    <footer class="contenedor-footer">
      <div class="footer-copyright">
        <p>&copy; 2024 Blossom Flower Shop - Todos los derechos reservados</p>
      </div>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/whatsapp.png" alt="logo whatsapp" /></li>
          <li><img src="../img/social.png" alt="logo whatsapp" /></li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
